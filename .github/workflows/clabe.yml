name: clabe test suite

on:
  pull_request:
  push:
    branches:
      - main
      - dev*
      - release*
  release:
    types: [ published ]

jobs:
  # ╔──────────────────────────╗
  # │   _____         _        │
  # │  |_   _|__  ___| |_ ___  │
  # │    | |/ _ \/ __| __/ __| │
  # │    | |  __/\__ \ |_\__ \ │
  # │    |_|\___||___/\__|___/ │
  # │                          │
  # ╚──────────────────────────╝
  tests:
    name: Python ${{ matrix.python-version }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ ubuntu-latest, windows-latest ]
        python-version: [ 3.11, 3.12, 3.13 ]
      fail-fast: false
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: Install python dependencies
        run: uv sync

      - name: Run ruff format
        run: uv run ruff format

      - name: Run ruff check
        run: uv run ruff check

      - name: Run interrogate
        run: uv run interrogate

      - name: Run codespell
        run: uv run codespell --check-filenames

      - name: Run pytest
        run: uv run pytest --cov clabe

      - name: Build
        run: uv build

  # ╔───────────────────────────────────────────────────────────╗
  # │    ____ ___ ____ ____    ____      _                      │
  # │   / ___|_ _/ ___|  _ \  |  _ \ ___| | ___  __ _ ___  ___  │
  # │  | |    | | |   | | | | | |_) / _ \ |/ _ \/ _` / __|/ _ \ │
  # │  | |___ | | |___| |_| | |  _ <  __/ |  __/ (_| \__ \  __/ │
  # │   \____|___\____|____/  |_| \_\___|_|\___|\__,_|___/\___| │
  # │                                                           │
  # ╚───────────────────────────────────────────────────────────╝
  # ╔─────────────────────────────────────────────────────────────────╗
  # │   ____        _     _ _        ____      _                      │
  # │  |  _ \ _   _| |__ | (_) ___  |  _ \ ___| | ___  __ _ ___  ___  │
  # │  | |_) | | | | '_ \| | |/ __| | |_) / _ \ |/ _ \/ _` / __|/ _ \ │
  # │  |  __/| |_| | |_) | | | (__  |  _ <  __/ |  __/ (_| \__ \  __/ │
  # │  |_|    \__,_|_.__/|_|_|\___| |_| \_\___|_|\___|\__,_|___/\___| │
  # │                                                                 │
  # ╚─────────────────────────────────────────────────────────────────╝

  prepare-release:
    runs-on: ubuntu-latest
    name: Set version from release tag
    needs: tests
    if: github.event_name == 'release' && github.event.action == 'published'
    outputs:
      version: ${{ steps.get_version.outputs.version }}

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: main

      - uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: Extract version from tag
        id: get_version
        shell: bash
        run: |
          version=$(echo "${{ github.event.release.tag_name }}" | sed 's/^v//')
          echo "version=$version" >> $GITHUB_OUTPUT
          echo "Setting version to: $version"

      - name: Validate version format
        run: uv version ${{ steps.get_version.outputs.version }} --dry-run

      - name: Set version
        run: uv version ${{ steps.get_version.outputs.version }}

      - name: Build
        run: uv build

      - name: Upload wheels as artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 1

      - name: Commit version changes
        shell: bash
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "Set version ${{ steps.get_version.outputs.version }} [skip ci]"
          git push origin main
          # Move the release tag to point to this new commit.
          git tag -fa "${{ github.event.release.tag_name }}" -m "${{ github.event.release.tag_name }}"
          git push origin "${{ github.event.release.tag_name }}" --force

  publish-to-pypi:
    runs-on: ubuntu-latest
    name: Publish to PyPI
    needs: prepare-release
    steps:
      - name: Download wheels artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: Publish to PyPI
        run: uv publish --token ${{ secrets.AIND_PYPI_TOKEN }}

      - name: Upload wheels to GitHub release
        uses: softprops/action-gh-release@v3
        with:
          files: dist/*

  # ╔─────────────────────────╗
  # │   ____                  │
  # │  |  _ \  ___   ___ ___  │
  # │  | | | |/ _ \ / __/ __| │
  # │  | |_| | (_) | (__\__ \ │
  # │  |____/ \___/ \___|___/ │
  # │                         │
  # ╚─────────────────────────╝
  build-docs:
    name: Build and deploy documentation to GitHub Pages
    runs-on: ubuntu-latest
    needs: prepare-release
    if: github.event_name == 'release' && !github.event.release.prerelease
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: main

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --group docs

      - name: Configure Git user
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Build & Deploy docs
        run: |
          uv run docs/build.py
          uv run mkdocs gh-deploy --force
